---
- name: Bootstrapping Kubernetes the Hard Way - Jumpbox Setup
  hosts: jumpbox
  become: true
  gather_facts: true

  vars:
    # Актуальні версії бінарників K8s згідно з оригінальним гайдом
    k8s_version: "v1.30.0"
    etcd_version: "v3.5.13"
    containerd_version: "1.7.15"
    cni_version: "v1.4.1"
    cfssl_version: "1.6.1"

  tasks:
    - name: Update apt cache and install baseline packages
      apt:
        update_cache: yes
        name:
          - wget
          - curl
          - vim
          - openssl
          - git
        state: present

    - name: Create working directory for Kubernetes files
      file:
        path: /root/kubernetes-the-hard-way
        state: directory
        mode: '0755'

    - name: Clone kubernetes-the-hard-way repository
      git:
        repo: 'https://github.com/kelseyhightower/kubernetes-the-hard-way.git'
        dest: /root/kubernetes-the-hard-way
        depth: 1
        force: yes

    - name: Create downloads directory
      file:
        path: /root/kubernetes-the-hard-way/downloads
        state: directory
        mode: '0755'

    - name: Download Kubernetes components directly
      get_url:
        url: "{{ item }}"
        dest: /root/kubernetes-the-hard-way/downloads/
        mode: '0755' # одразу даємо права на виконання
      loop:
        # CFSSL (генерація сертифікатів)
        - "https://github.com/cloudflare/cfssl/releases/download/v{{ cfssl_version }}/cfssl_{{ cfssl_version }}_linux_amd64"
        - "https://github.com/cloudflare/cfssl/releases/download/v{{ cfssl_version }}/cfssljson_{{ cfssl_version }}_linux_amd64"
        # Kubernetes Core
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kube-apiserver"
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kube-controller-manager"
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kube-scheduler"
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kubectl"
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kubelet"
        - "https://dl.k8s.io/{{ k8s_version }}/bin/linux/amd64/kube-proxy"

    - name: Rename and Move CFSSL binaries to /usr/local/bin
      copy:
        src: "/root/kubernetes-the-hard-way/downloads/cfssl_{{ cfssl_version }}_linux_amd64"
        dest: /usr/local/bin/cfssl
        mode: '0755'
        remote_src: yes

    - name: Rename and Move CFSSLJSON binaries to /usr/local/bin
      copy:
        src: "/root/kubernetes-the-hard-way/downloads/cfssljson_{{ cfssl_version }}_linux_amd64"
        dest: /usr/local/bin/cfssljson
        mode: '0755'
        remote_src: yes

    - name: Install kubectl to /usr/local/bin
      copy:
        src: /root/kubernetes-the-hard-way/downloads/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
        remote_src: yes

    - name: Verify tools installation
      command: "{{ item }}"
      loop:
        - "cfssl version"
        - "kubectl version --client"
      register: tools_version
      changed_when: false

    - name: Print tools version
      debug:
        msg: "{{ item.stdout_lines[0] if item.stdout_lines else item.stderr_lines[0] }}"
      loop: "{{ tools_version.results }}"