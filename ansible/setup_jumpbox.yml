---
- name: Bootstrapping Kubernetes the Hard Way - Jumpbox Setup
  hosts: jumpbox
  become: true
  gather_facts: true

  tasks:
    - name: Update apt cache and install baseline packages
      apt:
        update_cache: yes
        name:
          - wget
          - curl
          - vim
          - openssl
          - git
        state: present

    - name: Clone kubernetes-the-hard-way repository
      git:
        repo: 'https://github.com/kelseyhightower/kubernetes-the-hard-way.git'
        dest: /root/kubernetes-the-hard-way
        depth: 1
        force: yes

    - name: Download, extract and organize binaries
      shell: |
        set -e
        ARCH=$(dpkg --print-architecture)
        wget -q --show-progress --https-only --timestamping \
          -P downloads -i downloads-${ARCH}.txt
        mkdir -p downloads/client downloads/cni-plugins downloads/controller downloads/worker
        tar -xf downloads/crictl-v1.32.0-linux-${ARCH}.tar.gz -C downloads/worker/
        tar -xf downloads/containerd-2.1.0-beta.0-linux-${ARCH}.tar.gz --strip-components 1 -C downloads/worker/
        tar -xf downloads/cni-plugins-linux-${ARCH}-v1.6.2.tgz -C downloads/cni-plugins/
        tar -xf downloads/etcd-v3.6.0-rc.3-linux-${ARCH}.tar.gz -C downloads/ --strip-components 1 \
          etcd-v3.6.0-rc.3-linux-${ARCH}/etcdctl \
          etcd-v3.6.0-rc.3-linux-${ARCH}/etcd
        mv downloads/etcdctl downloads/client/
        mv downloads/kubectl downloads/client/
        mv downloads/etcd downloads/controller/
        mv downloads/kube-apiserver downloads/controller/
        mv downloads/kube-controller-manager downloads/controller/
        mv downloads/kube-scheduler downloads/controller/
        mv downloads/kubelet downloads/worker/
        mv downloads/kube-proxy downloads/worker/
        mv downloads/runc.${ARCH} downloads/worker/runc
        rm -f downloads/*.tar.gz downloads/*.tgz downloads/*.gz
        find downloads/client downloads/cni-plugins downloads/controller downloads/worker -type f -exec chmod +x {} \;
      args:
        chdir: /root/kubernetes-the-hard-way
        executable: /bin/bash
        creates: /root/kubernetes-the-hard-way/downloads/controller/etcd

    - name: Install kubectl
      copy:
        src: /root/kubernetes-the-hard-way/downloads/client/kubectl
        dest: /usr/local/bin/kubectl
        mode: '0755'
        remote_src: yes

    - name: Ensure root .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        mode: '0700'

    - name: Copy SSH private key as root identity key
      copy:
        src: ../tf-k8s-azure/k8s_id_rsa
        dest: /root/.ssh/id_rsa
        mode: '0600'

    - name: Copy machines.txt to kubernetes-the-hard-way
      copy:
        src: ../ansible/machines.txt
        dest: /root/kubernetes-the-hard-way/machines.txt
        mode: '0644'
