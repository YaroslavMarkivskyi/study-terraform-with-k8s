---
- name: Generate and Distribute Kubernetes Configuration Files
  hosts: jumpbox
  become: true
  vars:
    k8s_dir: /root/kubernetes-the-hard-way

  tasks:
    - name: Generate kubelet kubeconfigs for worker nodes
      shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.crt \
          --embed-certs=true \
          --server=https://server.kubernetes.local:6443 \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config set-credentials system:node:{{ item }} \
          --client-certificate={{ item }}.crt \
          --client-key={{ item }}.key \
          --embed-certs=true \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:node:{{ item }} \
          --kubeconfig={{ item }}.kubeconfig

        kubectl config use-context default \
          --kubeconfig={{ item }}.kubeconfig
      args:
        chdir: "{{ k8s_dir }}"
        creates: "{{ k8s_dir }}/{{ item }}.kubeconfig"
      loop:
        - node-0
        - node-1

    - name: Generate kube-proxy kubeconfig
      shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.crt \
          --embed-certs=true \
          --server=https://server.kubernetes.local:6443 \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config set-credentials system:kube-proxy \
          --client-certificate=kube-proxy.crt \
          --client-key=kube-proxy.key \
          --embed-certs=true \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-proxy \
          --kubeconfig=kube-proxy.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-proxy.kubeconfig
      args:
        chdir: "{{ k8s_dir }}"
        creates: "{{ k8s_dir }}/kube-proxy.kubeconfig"

    - name: Generate kube-controller-manager kubeconfig
      shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.crt \
          --embed-certs=true \
          --server=https://server.kubernetes.local:6443 \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config set-credentials system:kube-controller-manager \
          --client-certificate=kube-controller-manager.crt \
          --client-key=kube-controller-manager.key \
          --embed-certs=true \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-controller-manager \
          --kubeconfig=kube-controller-manager.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-controller-manager.kubeconfig
      args:
        chdir: "{{ k8s_dir }}"
        creates: "{{ k8s_dir }}/kube-controller-manager.kubeconfig"

    - name: Generate kube-scheduler kubeconfig
      shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.crt \
          --embed-certs=true \
          --server=https://server.kubernetes.local:6443 \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config set-credentials system:kube-scheduler \
          --client-certificate=kube-scheduler.crt \
          --client-key=kube-scheduler.key \
          --embed-certs=true \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=system:kube-scheduler \
          --kubeconfig=kube-scheduler.kubeconfig

        kubectl config use-context default \
          --kubeconfig=kube-scheduler.kubeconfig
      args:
        chdir: "{{ k8s_dir }}"
        creates: "{{ k8s_dir }}/kube-scheduler.kubeconfig"

    - name: Generate admin kubeconfig
      shell: |
        kubectl config set-cluster kubernetes-the-hard-way \
          --certificate-authority=ca.crt \
          --embed-certs=true \
          --server=https://127.0.0.1:6443 \
          --kubeconfig=admin.kubeconfig

        kubectl config set-credentials admin \
          --client-certificate=admin.crt \
          --client-key=admin.key \
          --embed-certs=true \
          --kubeconfig=admin.kubeconfig

        kubectl config set-context default \
          --cluster=kubernetes-the-hard-way \
          --user=admin \
          --kubeconfig=admin.kubeconfig

        kubectl config use-context default \
          --kubeconfig=admin.kubeconfig
      args:
        chdir: "{{ k8s_dir }}"
        creates: "{{ k8s_dir }}/admin.kubeconfig"

    - name: Distribute kubeconfigs to worker nodes
      shell: |
        ssh -o StrictHostKeyChecking=no root@{{ item }} mkdir -p /var/lib/kube-proxy /var/lib/kubelet
        scp -o StrictHostKeyChecking=no {{ k8s_dir }}/kube-proxy.kubeconfig root@{{ item }}:/var/lib/kube-proxy/kubeconfig
        scp -o StrictHostKeyChecking=no {{ k8s_dir }}/{{ item }}.kubeconfig root@{{ item }}:/var/lib/kubelet/kubeconfig
      loop:
        - node-0
        - node-1

    - name: Distribute kubeconfigs to server
      shell: >-
        scp -o StrictHostKeyChecking=no
        {{ k8s_dir }}/admin.kubeconfig
        {{ k8s_dir }}/kube-controller-manager.kubeconfig
        {{ k8s_dir }}/kube-scheduler.kubeconfig
        root@server:~/
